<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Complaint System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/loginstyle.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="container">
<div class="login-box">

<h2>Login</h2>

<!-- ✅ CORRECT CONNECTION -->
<form method="POST" action="/login">

<div class="input-box">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-box password-box">
<label>Password</label>
<input type="password" id="password" name="password" required>
<i class="fa fa-eye" onclick="togglePassword()"></i>
</div>

<button type="submit">Login</button>

</form>

<div class="register-text">
Don't have an account? 
<a href="/register">Register</a> <!-- ✅ CORRECT LINK -->
</div>

</div>
</div>

<script>
function togglePassword() {
    let input = document.getElementById("password");
    let icon = document.querySelector(".password-box i");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    }
}
</script>

</body>
</html>
